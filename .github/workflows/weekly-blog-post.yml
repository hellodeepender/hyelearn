name: Weekly Blog Post

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Generate blog post
        run: npx tsx scripts/generate-blog-post.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}

      - name: Create PR with new post
        run: |
          BRANCH="blog/$(date +%Y-%m-%d)-$(shuf -i 1000-9999 -n 1)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add content/blog/ public/images/blog/
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new blog post generated — skipping PR"
            exit 0
          fi
          git commit -m "blog: auto-generated weekly post"
          git push origin "$BRANCH" --force
          gh pr create \
            --title "Weekly blog post — $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          Auto-generated blog post. Review, edit if needed, then merge to publish.

          **To preview:** Check the new `.mdx` file in `content/blog/` and image in `public/images/blog/`.

          Generated with Claude Opus via the Anthropic API. Image from Unsplash.
          EOF
          )" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
